<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="X-Space360 — India's short-term rentals platform" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <link rel="icon" zz-type="image/jpeg" href="/favicon_rich.jpg?v=3" />
        <link rel="shortcut icon" type="image/jpeg" href="/favicon_rich.jpg?v=3" />
        <link rel="apple-touch-icon" href="/favicon_rich.jpg?v=3" />
        <!-- Preload first WebP hero image for LCP optimization -->
        <link rel="preload" href="/videos/hero/pexels-thevisionaryvows-33485971.webp" as="image" type="image/webp" fetchpriority="high" />
        <title>X-Space360 | Short-term Rentals</title>

<!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
        <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  gtag('js', new Date());

  gtag('config', 'G-XXXXXXXXXX');
</script>

    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
            (function () {
                var loadFailed = false;

                window.addEventListener(
                    "error",
                    function (event) {
                        var target = event.target;
                        if (
                            target &&
                            (target.tagName === "SCRIPT" || target.tagName === "LINK")
                        ) {
                            loadFailed = true;
                        }
                    },
                    true
                );

                window.setTimeout(function () {
                    var root = document.getElementById("root");
                    if (!root || root.childElementCount > 0) return;

                    root.innerHTML =
                        '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,Arial,sans-serif;background:#fff;color:#181818">' +
                        '<section style="max-width:520px;text-align:center">' +
                        '<h1 style="font-size:24px;margin:0 0 12px">X-Space360 is refreshing</h1>' +
                        '<p style="line-height:1.6;color:#666;margin:0 0 20px">' +
                        (loadFailed
                            ? "A new version could not be loaded completely."
                            : "The application is taking longer than expected to start.") +
                        " Please refresh this page.</p>" +
                        '<button onclick="window.location.reload()" style="border:0;background:#181818;color:#fff;padding:12px 20px;cursor:pointer;font:inherit">Refresh page</button>' +
                        "</section></main>";
                }, 8000);
            })();
        </script>

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
        <!-- Analytics/session recording removed to avoid third-party CSP/CORB warnings and reduce data exposure. -->
    </body>
</html>
