services:
  redis:
    image: redis:7-alpine
    container_name: xspace-prod-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: xspace-prod-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - redis

volumes:
  redis_data:
